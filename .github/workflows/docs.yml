name: Generate Doxygen Documentation

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Doxyfile'
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen + Graphviz
        run: |
          # Installe la dernière version de Doxygen (pas celle d'apt qui est trop vieille)
          wget -q https://github.com/doxygen/doxygen/releases/download/Release_1_11_0/doxygen-1.11.0.linux.bin.tar.gz
          tar -xzf doxygen-1.11.0.linux.bin.tar.gz
          sudo cp doxygen-1.11.0/bin/doxygen /usr/local/bin/
          sudo apt-get install -y graphviz

      - name: Create output directory
        run: mkdir -p docs/doxygen   # ← le fix principal

      - name: Generate documentation
        run: doxygen Doxyfile

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/doxygen/html